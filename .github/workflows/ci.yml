name: CI Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_WHATSAPP_NUMBER: "525512345678"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # --- Governance Checks ---
      - name: Governance - DB Drift
        run: pnpm governance:check-db-contracts:fail

      - name: Governance - Inline Types
        run: pnpm governance:check-inline-types:fail

      - name: Governance - Production Any
        run: pnpm governance:check-production-any:fail

      - name: Governance - Action Pipeline
        run: pnpm governance:check-action-pipeline:fail
      # -------------------------

      # --- Build Application ---
      - name: Build Application
        run: pnpm build
      # -------------------------

      - name: Unit & Integration Tests (Vitest)
        run: pnpm test

      # --- CACHÉ PLAYWRIGHT ---
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      # -----------------------------

      - name: Install Playwright Browsers
        # -- Playwright will use the cached browsers if available
        run: pnpm exec playwright install --with-deps

      - name: E2E Tests (Playwright)
        run: pnpm exec playwright test
